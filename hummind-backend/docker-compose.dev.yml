services:
  postgres:
    image: postgres:16-alpine
    container_name: hummind-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hummindos_db
    ports:
      - "5433:5432"
    volumes:
      - hummind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hummindos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hummind-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Host port 6380 (the default 6379 is often already taken by other
    # local Redis instances). Override REDIS_HOST/REDIS_PORT in .env to
    # change this without editing the compose file.
    ports:
      - "6380:6379"
    volumes:
      - hummind-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hummind-postgres-data:
    name: hummind-postgres-data
  hummind-redis-data:
    name: hummind-redis-data
